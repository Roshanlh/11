<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News</title>
    <style>
        /* ===== NewsMinimalist 原版风格变量 ===== */
        :root {
            --bg: #ffffff;
            --text-primary: #111111;
            --text-secondary: #595959;
            --line: #e5e5e5;
            --link: #0047ab;
        }

        [data-theme="dark"] {
            --bg: #0f0f11;
            --text-primary: #e8e8ed;
            --text-secondary: #8a8a93;
            --line: #27272b;
            --link: #70a8ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.8;
            max-width: 720px;
            margin: 0 auto;
            padding: 4rem 2rem;
            transition: background 0.4s ease, color 0.4s ease;
        }

        header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--line);
            padding-bottom: 1.2rem;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .filter-bar {
            margin-bottom: 2.5rem;
            display: flex;
            gap: 1.8rem;
        }

        .filter-bar button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            padding: 0;
        }

        .filter-bar button.active {
            color: var(--text-primary);
            font-weight: 500;
        }

        .news-item {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--line);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .source {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .title-cn {
            font-size: 16px;
            font-weight: 500;
        }

        .title-en {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        a {
            color: var(--link);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        #toggle-theme {
            position: fixed;
            top: 1.6rem;
            right: 1.6rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
        }

        .empty-tip {
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <button id="toggle-theme">切换明暗</button>

    <header>
        <h1>News</h1>
        <div class="subtitle">每日精选 · 全球财经 & 水利政务 · 更新于 <span id="update-time"></span></div>
    </header>

    <div class="filter-bar">
        <button class="active" data-type="all">全部</button>
        <button data-type="foreign">海外财经</button>
        <button data-type="water">水利政务</button>
    </div>

    <main id="container">
        <div class="empty-tip">加载中…</div>
    </main>

    <script>
        // 明暗模式 跟随系统/本地缓存
        const themeKey = "nm_theme";
        const darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const savedTheme = localStorage.getItem(themeKey);

        if (savedTheme === "dark" || (!savedTheme && darkMode)) {
            document.documentElement.setAttribute("data-theme", "dark");
        }

        document.getElementById("toggle-theme").addEventListener("click", () => {
            const isDark = document.documentElement.hasAttribute("data-theme");
            if (isDark) {
                document.documentElement.removeAttribute("data-theme");
                localStorage.setItem(themeKey, "light");
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
                localStorage.setItem(themeKey, "dark");
            }
        });

        // 数据源分类
        const foreignList = ["路透社", "彭博社", "经济学人", "华尔街日报", "财富"];
        const waterList = ["国家水利部", "甘肃省水利厅", "天水市水务局"];

        let rawData = [];

        // 渲染
        function render(data) {
            const container = document.getElementById("container");
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-tip">暂无资讯，请等待自动更新</div>';
                return;
            }
            let html = "";
            data.forEach(item => {
                html += `
                <div class="news-item" data-tag="${foreignList.includes(item.s) ? "foreign" : "water"}">
                    <div class="source">${item.s}</div>
                    <div class="title-cn"><a href="${item.u}" target="_blank">${item.c}</a></div>
                    ${item.e ? `<div class="title-en">${item.e}</div>` : ""}
                </div>
                `;
            });
            container.innerHTML = html;
        }

        // 分类筛选
        document.querySelectorAll(".filter-bar button").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-bar button").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                const type = btn.dataset.type;
                if (type === "all") return render(rawData);
                const filterKey = type === "foreign" ? foreignList : waterList;
                const res = rawData.filter(x => filterKey.includes(x.s));
                render(res);
            });
        });

        // 拉取新闻数据
        fetch("news.json")
            .then(res => res.json())
            .then(list => {
                rawData = list;
                render(list);
                // 更新时间
                const now = new Date();
                document.getElementById("update-time").innerText = now.toLocaleString("zh-CN");
            })
            .catch(() => {
                document.getElementById("container").innerHTML = '<div class="empty-tip">数据加载失败，请手动执行一次更新任务</div>';
            });
    </script>
</body>
</html>
